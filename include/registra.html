<html>
    <head>
        <title>Libreria</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../asset/css/registra.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    </head>

<body>

    <!-- Contenitore principale della pagina -->
    <div class="riquadro">
        <!--logo -->
        <img src="../asset/img/logo.png" class="logo">

        <!-- Titolo principale della sezione -->
        <h1 class="titolo">Registrati</h1>

        <!-- Bottone per tornare alla pagina precedente -->
        <button class="btnIndietro" id="indietro">

            <!-- Icona freccia indietro -->
            <ion-icon name="arrow-back-outline"></ion-icon>
        </button>

        <!-- FORM DI REGISTRAZIONE -->
        <!-- PHP riceve i dati -->
        <!-- POST: i dati vengono inviati in modo sicuro nel body della richiesta -->
        <form action="../php/registra.php" method="POST">

            <!-- Campo Nome -->
            <div class="input-box" required>
                <input type="text" name="nome" required>
                <label>Nome</label>
            </div>

            <!-- Campo Cognome -->
            <div class="input-box" required>
                <input type="text" name="cognome" required>
                <label>Cognome</label>
            </div>

            <!-- Campo Data di nascita -->
            <div class="input-box" required>
                <input type="date" name="data_nascita" required>
                <label>Data di Nascita</label>
            </div>

            <!-- Menu a tendina: Genere -->
            <div class="input-box">
                <select name="genere" required>
                    <option value="M">Maschio</option>
                    <option value="F">Femmina</option>
                    <option value="Altro">Altro</option>
                </select>
                <label>Genere</label>
            </div>

            <!-- Menu a tendina: Tipo utente -->
            <div class="input-box">
                <select name="tipo_utente" required>
                    <option value="Studente">Studente</option>
                    <option value="Docente">Docente</option>
                    <option value="Altro">Altro</option>
                </select>
                <label>Tipo Utente</label>
            </div>

            <!-- Campo indirizzo -->
            <div class="input-box">
                <input type="text" name="indirizzo" required>
                <label>Indirizzo di residenza</label>
            </div>

            <!-- Campo città -->
            <div class="input-box">
                <input type="text" name="citta" required>
                <label>Città di nascita</label>
            </div>

            <!-- Campo telefono -->
            <div class="input-box">
                <input type="text" name="telefono" required>
                <label>Telefono</label>
            </div>

            <!-- Campo email  -->
            <div class="input-box">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>

            <!-- Campo nickname  -->
            <div class="input-box">
                <input type="text" name="nickname" required>
                <label>Nickname</label>
            </div>

            <!-- Campo password  -->
            <div class="input-box">
                <input type="text" name="password" required>
                <label>Password</label>
            </div>

            <!-- Pulsante di invio -->
            <button class="registra" id="registra" type="submit">Registrati</button>

        </form>

    </div>
</body>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="../asset/js/registra.js"></script>

</html>
