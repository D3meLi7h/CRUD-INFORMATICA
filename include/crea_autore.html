<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Libreria - Aggiungi Autore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../asset/css/crea.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
</head>

<body>

    <div class="riquadro">
        <h1 class="titolo">Aggiungi autore</h1>

        <button type="button" class="btnIndietro" id="indietro">
            <ion-icon name="arrow-back-outline"></ion-icon>
        </button>

        <form action="../php/elabora_autore.php" method="POST" id="form-autore">

            <div class="input-box">
                <label for="nome">Nome*</label>
                <input type="text" id="nome" name="nome" maxlength="50" required>
            </div>

            <div class="input-box">
                <label for="cognome">Cognome*</label>
                <input type="text" id="cognome" name="cognome" maxlength="50" required>
            </div>

            <div class="input-box">
                <label for="nazionalita">Nazionalità</label>
                <input type="text" id="nazionalita" name="nazionalita" maxlength="50" placeholder="es. Italiana">
            </div>

            <div class="input-box">
                <label for="data_nascita">Data di nascita</label>
                <input type="date" id="data_nascita" name="data_nascita">
            </div>

            <button type="submit" class="invio" id="invio">
                <ion-icon name="checkmark-outline"></ion-icon>
            </button>

        </form>

    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="../asset/js/crea.js"></script>
</body>
</html>
