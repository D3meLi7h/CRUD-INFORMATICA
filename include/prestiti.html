<html>
    <head>
        <title>Libreria</title>
        <link rel="stylesheet" href="../asset/css/prestiti.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    </head>

<body>

    <!-- Contenitore principale della pagina -->
    <div class="riquadro">

        <!-- Titolo principale della sezione -->
        <h1 class="titolo">Prestiti</h1>
    
        <!-- Bottone di logout -->
        <button class="btnLogout" id="logout">
            <!-- Icona Ionicons per logout -->
            <ion-icon name="exit-outline"></ion-icon>

            <!-- Inserimento nickname dell'utente nel bottone-->
            <span class="nickname"></span>
        </button>

        <!-- Bottone per tornare alla pagina precedente -->
        <button class="btnIndietro" id="indietro">
            <!-- Icona freccia indietro -->
            <ion-icon name="arrow-back-outline"></ion-icon>
        </button>

        <!-- PRESTITI -->
        <div class="cerca" id="cerca">
            <label>Cerca libro</label>
            <ion-icon name="search-outline"></ion-icon>
            <div class="input-box">
                <input type="text" placeholder="Cerca titolo o autore... ">
            </div>
        </div>

        <div class="selezione" id="selezione">
            <span class="libro" id="libro"></span>
        </div>

        <div class="dataRestituzione">
            <label>Data restituzione (opzionale)</label>
            <input type="date" id="dataRestituzione">
        </div>

        <button class="btnConferma" id="btnConferma" type="button">Richiedi Prestito</button>

        <!-- Sottotitolo della pagina -->
        <h2 class="sottotitolo">My School Library</h2>

    </div>
</body>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="../asset/js/prestiti.js"></script>

</html>
