<html>
    <head>
        <title>Libreria</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../asset/css/crea.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    </head>

<body>

    <div class="riquadro">
        <h1 class="titolo">Aggiungi libro</h1>

        <!-- BOTTONE PAGINA PRECEDENTE -->
        <button class="btnIndietro" id="indietro">
            <ion-icon name="arrow-back-outline"></ion-icon>
        </button>

        <!-- Libri.Titolo VARCHAR(100) NOT NULL -->
        <div class="input-box">
            <label>Titolo*</label>
            <input type="text" id="titolo" maxlength="100" required>
        </div>

        <!-- Autori.Nome + Autori.Cognome (ricerca/inserimento autore) -->
        <div class="input-box">
            <label>Autore*</label>
            <input type="text" id="autore" placeholder="es. Italo Calvino" required>
        </div>

        <!-- Libri.Posizione VARCHAR(20) NOT NULL -->
        <div class="input-box">
            <label>Posizione*</label>
            <input type="text" id="posizione" maxlength="20" placeholder="es. A1" required>
        </div>

        <!-- Libri.ISBN VARCHAR(17) NOT NULL UNIQUE -->
        <div class="input-box">
            <label>ISBN*</label>
            <input type="text" id="isbn" maxlength="17" required>
        </div>

        <!-- Libri.Anno_Pubblicazione INT NOT NULL -->
        <div class="input-box">
            <label>Anno di pubblicazione*</label>
            <input type="number" id="anno" min="1000" max="2100" required>
        </div>

        <!-- Libri.Numero_Pagine INT NOT NULL -->
        <div class="input-box">
            <label>Numero di pagine*</label>
            <input type="number" id="pagine" min="1" required>
        </div>

        <!-- Libri.Lingua_Originale VARCHAR(30) NOT NULL -->
        <div class="input-box">
            <label>Lingua originale*</label>
            <input type="text" id="lingua" maxlength="30" placeholder="es. Italiano" required>
        </div>

        <!-- Libri.Copie_disponibili INT DEFAULT 1 -->
        <div class="input-box">
            <label>Copie disponibili</label>
            <input type="number" id="copie" min="0" value="1">
        </div>

        <!-- Categorie.Genere_Libro ENUM → Libri.Cod_Categoria FK -->
        <div class="input-box">
            <label>Genere*</label>
            <select class="genere" id="genere" required>
                <option value="" disabled selected>Seleziona un genere</option>
                <option value="Narrativa">Narrativa</option>
                <option value="Saggio">Saggio</option>
                <option value="Manuale">Manuale</option>
                <option value="Storico">Storico</option>
                <option value="Fantascienza">Fantascienza</option>
                <option value="Horror">Horror</option>
                <option value="Giallo">Giallo</option>
                <option value="Altro">Altro</option>
            </select>
        </div>

        <!-- Libri.Descrizione TEXT (opzionale) -->
        <div class="input-box">
            <label>Descrizione</label>
            <textarea id="descrizione" rows="3" placeholder="Breve descrizione del libro..."></textarea>
        </div>

        <!-- CONFERMA -->
        <button type="submit" class="invio" id="invio">
            <ion-icon name="checkmark-outline"></ion-icon>
        </button>

    </div>

</body>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="../asset/js/crea.js"></script>

</html>
