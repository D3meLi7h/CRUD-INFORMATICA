<html>
    <head>
        <title>Libreria</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="asset/css/style.css">

        <!--font-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    </head>

    <body>

        <!-- Titolo pagina -->
        <h1 class="titolo">My School Library</h1>

        <!-- Bottone di login in alto a destra -->
        <button class="btnLogin">
            <!-- Icona-->
            <ion-icon class="LoginIcn" name="log-in-outline"></ion-icon>
            Login
        </button>

        <!-- Riquadro popup) -->
        <div class="riquadro">

            <!-- Bottone per chiudere popup -->
            <button class="chiudi">
                <ion-icon name="close-outline"></ion-icon>
            </button>

            <!-- Titolo form -->
            <h2>Accesso</h2>
            <!--input nickname-->
            <div class="input-box">
                <input type="text" required>
                <label>Nickname</label>
            </div>

            <!--input password-->
            <div class="input-box">
                <input type="password" required>
                <label>Password</label>
            </div>

            <!--registrazione -->
            <div class="registrazione" id="registrazione">
                <p>
                    Non hai un account?
                    <!-- Link per registrazione -->
                    <a href="#" class="linkRegistra" id="linkRegistra">Registrati</a>
                </p>
            </div>

            <!-- Bottone per entrare -->
            <button class="btnEntra">Inizia a leggere</button>
        </div>

        <script src="asset/js/index.js"></script>

        <!--Ionicons-->
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    </body>
</html>
